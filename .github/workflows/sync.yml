name: Daily Arketa → Playtomic Sync

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run sync
        env:
          ARKETA_REFRESH_TOKEN: ${{ secrets.ARKETA_REFRESH_TOKEN }}
          ARKETA_PARTNER_ID: ${{ secrets.ARKETA_PARTNER_ID }}
          PLAYTOMIC_EMAIL: ${{ secrets.PLAYTOMIC_EMAIL }}
          PLAYTOMIC_PASSWORD: ${{ secrets.PLAYTOMIC_PASSWORD }}
          MEMBERSHIP_NAMES: ${{ secrets.MEMBERSHIP_NAMES }}
        run: node src/index.js

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: import-result
          path: /tmp/playtomic-*.png
          retention-days: 7
          if-no-files-found: warn
